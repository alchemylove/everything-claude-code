# Everything Claude Code Release Sync

## アクション (Action)

公開前に package のバージョン、plugin manifest、リリース向けドキュメントを同期する。

## 根拠 (Evidence)

- リリース作業は `package.json`、`.claude-plugin/*`、`.opencode/package.json`、リリースノートにまたがる。
- バージョンのずれは、壊れた更新パスと混乱するインストールサーフェスの原因になる。

