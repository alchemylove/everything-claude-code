# Everything Claude Code Test Runner

## アクション (Action)

リポジトリ既存の Node ベースのテストフローを使用する。まず対象の `*.test.js` を実行し、広範な検証には `node tests/run-all.js` または `npm test` を使う。

## 根拠 (Evidence)

- リポジトリは `tests/run-all.js` を中央のテストオーケストレーターとして使用している。
- テストファイルは hook、CI、integration カバレッジ全体で `*.test.js` 命名に従っている。

