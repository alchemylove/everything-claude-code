# Everything Claude Code Cross Platform Sync

## アクション (Action)

ルートリポジトリを正とし、機能が実際に存在する範囲でのみ `.cursor/`、`.codex/`、`.opencode/`、`.agents/` へミラーリングする。

## 根拠 (Evidence)

- ECC は重複するが同一ではないファイルを持つ複数の harness 向けサーフェスを維持している。
- 最も安全なワークフローは、ルートファーストの後に明示的なパリティ更新を行うことである。

